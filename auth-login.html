<!doctype html>
<html lang="en">
  <head>

    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>Login - FundTrack</title>

    <!-- Bootstrap CSS-->
    <link rel="stylesheet" href="assets/modules/bootstrap-5.1.3/css/bootstrap.css">
    <!-- Style CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Boostrap Icon-->
    <link rel="stylesheet" href="assets/modules/bootstrap-icons/bootstrap-icons.css">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="assets/modules/fontawesome6.1.1/css/all.css">
    <!-- Toastify CSS -->
    <link rel="stylesheet" href="assets/modules/toastify/toastify.min.css">
    
    <style>
      .auth-logo a {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .auth-logo img {
        width: 40px;
        height: 40px;
      }
      .btn-login {
        background: linear-gradient(135deg, #3498db, #2c3e50);
        border: none;
        transition: all 0.3s ease;
      }
      .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(52, 152, 219, 0.3);
      }
      .btn-login:disabled {
        opacity: 0.7;
        transform: none;
      }
      .alert {
        border-radius: 10px;
        margin-bottom: 20px;
      }
      .spinner-border-sm {
        width: 1rem;
        height: 1rem;
        margin-right: 8px;
      }
      .toggle-password {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #7f8c8d;
        z-index: 10;
      }
      .toggle-password:hover {
        color: #3498db;
      }
      .demo-info {
        background: #f8f9fa;
        border-radius: 10px;
        padding: 15px;
        margin-top: 20px;
        font-size: 0.85rem;
      }
      .demo-info i {
        color: #3498db;
        margin-right: 8px;
      }
    </style>
</head>
<body>
 
  <div id="auth">
        
    <div class="row h-100">
      <div class="col-lg-7 d-none d-lg-block">
        <div id="auth-left">
        </div>
      </div>
      <div class="col-lg-5 col-12">
        <div id="auth-right">
          <div class="auth-logo">
            <a href="main.html"><img src="assets/images/logo.png" alt="Logo"> FundTrack</a>  
          </div>
          <h1 class="auth-title">Welcome Back</h1>
          <p class="auth-subtitle mb-4">Sign in to access your dashboard</p>
    
          <div id="alertContainer"></div>

          <form id="loginForm">
            <div class="form-group position-relative has-icon-left mb-4">
              <input type="email" class="form-control form-control-xl" id="email" placeholder="Email Address" required>
              <div class="form-control-icon">
                <i class="bi bi-envelope"></i>
              </div>
            </div>
            <div class="form-group position-relative has-icon-left mb-4">
              <input type="password" class="form-control form-control-xl" id="password" placeholder="Password" required>
              <div class="form-control-icon">
                <i class="bi bi-shield-lock"></i>
              </div>
              <span class="toggle-password" onclick="togglePassword()">
                <i class="far fa-eye" id="toggleIcon"></i>
              </span>
            </div>
            <div class="form-check form-check-lg d-flex align-items-end">
              <input class="form-check-input me-2" type="checkbox" id="rememberMe">
              <label class="form-check-label text-gray-600" for="rememberMe">
                Keep me logged in
              </label>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg shadow-lg mt-5" id="loginBtn">
              <i class="fas fa-sign-in-alt me-2"></i> Sign In
            </button>
          </form>
          </div>

        </div>
      </div>
      
    </div>
  </div>
    
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore-compat.js"></script>

  <!-- General JS Scripts -->
  <script src="assets/js/atrana.js"></script>

  <!-- JS Libraies -->
  <script src="assets/modules/jquery/jquery.min.js"></script>
  <script src="assets/modules/bootstrap-5.1.3/js/bootstrap.bundle.min.js"></script>
  <script src="assets/modules/popper/popper.min.js"></script>
  <script src="assets/modules/toastify/toastify.min.js"></script>

  <script>
    // Firebase Configuration - REPLACE WITH YOUR CONFIG
    const firebaseConfig = {
      apiKey: "AIzaSyAtduM2t1jzgVs0TfPD48t3LJB5UJ90BrQ",
      authDomain: "fundmonitoring-3c89f.firebaseapp.com",
      projectId: "fundmonitoring-3c89f",
      storageBucket: "fundmonitoring-3c89f.firebasestorage.app",
      messagingSenderId: "630221204555",
      appId: "1:630221204555:web:fa5116e95ad993093bb1ce",
      measurementId: "G-MQ35CGE6EB"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Set persistence based on "Remember Me"
    const rememberMeCheckbox = document.getElementById('rememberMe');
    rememberMeCheckbox.addEventListener('change', (e) => {
      const persistence = e.target.checked 
        ? firebase.auth.Auth.Persistence.LOCAL 
        : firebase.auth.Auth.Persistence.SESSION;
      auth.setPersistence(persistence);
    });

    // Check if already logged in
    auth.onAuthStateChanged(async (user) => {
      if (user) {
        // Check user role
        const userDoc = await db.collection('users').doc(user.uid).get();
        const userData = userDoc.data();
        
        if (userData?.role === 'admin') {
          window.location.href = 'index.html';
        } else {
          window.location.href = 'index.html';
        }
      }
    });

    // Toggle password visibility
    function togglePassword() {
      const passwordInput = document.getElementById('password');
      const toggleIcon = document.getElementById('toggleIcon');
      
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.classList.remove('fa-eye');
        toggleIcon.classList.add('fa-eye-slash');
      } else {
        passwordInput.type = 'password';
        toggleIcon.classList.remove('fa-eye-slash');
        toggleIcon.classList.add('fa-eye');
      }
    }

    // Show alert
    function showAlert(message, type = 'danger') {
      const container = document.getElementById('alertContainer');
      container.innerHTML = `
        <div class="alert alert-${type} alert-dismissible fade show" role="alert">
          <i class="fas fa-${type === 'danger' ? 'exclamation-circle' : 'check-circle'} me-2"></i>
          ${message}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      `;
    }

    // Show toast
    function showToast(message, type = 'success') {
      Toastify({
        text: message,
        duration: 3000,
        gravity: 'top',
        position: 'right',
        backgroundColor: type === 'success' ? '#27ae60' : '#e74c3c',
      }).showToast();
    }

    // Handle login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const loginBtn = document.getElementById('loginBtn');
      
      // Validation
      if (!email || !password) {
        showAlert('Please enter both email and password', 'danger');
        return;
      }

      // Show loading state
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing in...';

      try {
        // Sign in with Firebase
        const userCredential = await auth.signInWithEmailAndPassword(email, password);
        const user = userCredential.user;
        
        // Get or create user role in Firestore
        const userDoc = await db.collection('users').doc(user.uid).get();
        
        if (!userDoc.exists) {
          // Create user document if doesn't exist
          // Default role: 'viewer' for regular users
          // You can manually set 'admin' in Firebase Console for admin users
          const defaultRole = email.includes('admin') ? 'admin' : 'viewer';
          
          await db.collection('users').doc(user.uid).set({
            email: user.email,
            role: defaultRole,
            displayName: user.displayName || email.split('@')[0],
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          });
        }
        
        showToast('Login successful! Redirecting...', 'success');
        
        // Redirect to dashboard
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1000);
        
      } catch (error) {
        console.error('Login error:', error);
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i> Sign In';
        
        let errorMessage = 'Login failed. Please try again.';
        if (error.code === 'auth/user-not-found') {
          errorMessage = 'No account found with this email.';
        } else if (error.code === 'auth/wrong-password') {
          errorMessage = 'Incorrect password. Please try again.';
        } else if (error.code === 'auth/invalid-email') {
          errorMessage = 'Please enter a valid email address.';
        } else if (error.code === 'auth/too-many-requests') {
          errorMessage = 'Too many failed attempts. Please try again later.';
        } else if (error.code === 'auth/network-request-failed') {
          errorMessage = 'Network error. Please check your connection.';
        }
        
        showAlert(errorMessage, 'danger');
      }
    });

    // Pre-fill demo credentials on double-click (optional)
    document.querySelector('.demo-info').addEventListener('dblclick', function(e) {
      const target = e.target.closest('code');
      if (target) {
        const email = target.textContent;
        if (email.includes('@')) {
          document.getElementById('email').value = email;
          if (email.includes('admin')) {
            document.getElementById('password').value = 'admin123';
          } else {
            document.getElementById('password').value = 'viewer123';
          }
          showToast('Demo credentials filled', 'info');
        }
      }
    });
  </script>

  <!-- Template JS File -->
  <script src="assets/js/script.js"></script>
  <script src="assets/js/custom.js"></script>
</body>
</html>
