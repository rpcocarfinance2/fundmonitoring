    ];

    const totalRecords = transactionsData.length;
    let imported = 0;
    let failed = 0;
    const logElement = document.getElementById('log');
    const statusElement = document.getElementById('status');
    const progressBar = document.getElementById('progressBar');

    function log(message, isError = false) {
      const line = document.createElement('div');
      line.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      line.style.color = isError ? '#dc3545' : '#198754';
      logElement.appendChild(line);
      logElement.scrollTop = logElement.scrollHeight;
    }

    function updateProgress() {
      const percent = Math.round(((imported + failed) / totalRecords) * 100);
      progressBar.style.width = percent + '%';
      progressBar.textContent = percent + '%';
    }

    async function importData() {
      imported = 0;
      failed = 0;
      logElement.innerHTML = '';
      statusElement.className = 'alert alert-info';
      statusElement.textContent = 'Starting import...';
      document.getElementById('importBtn').disabled = true;
      document.getElementById('clearBtn').disabled = true;

      log(`Starting import of ${totalRecords} records...`);

      for (let i = 0; i < transactionsData.length; i++) {
        const data = transactionsData[i];
        try {
          // Add timestamp
          data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
          data.updatedAt = firebase.firestore.FieldValue.serverTimestamp();
          
          // Add monthly data (default empty)
          data.monthly = {
            jan: 0, feb: data.obligation || 0, mar: 0, apr: 0, may: 0, jun: 0,
            jul: 0, aug: 0, sep: 0, oct: 0, nov: 0, dec: 0
          };
          
          // Add default fields
          data.engasDate = '';
          data.boxDofDV = '';
          data.dvReceived = '';
          data.lddapNo = '';
          data.expendituresLPGross = 0;
          data.totalExpenditures = data.obligation || 0;

          await db.collection('transactions').add(data);
          imported++;
          log(`✓ Imported: ${data.orsNo} - ${data.payee} (₱${data.obligation.toLocaleString()})`);
        } catch (error) {
          failed++;
          log(`✗ Failed: ${data.orsNo} - ${error.message}`, true);
        }
        updateProgress();
        
        // Small delay to avoid rate limiting
        await new Promise(resolve => setTimeout(resolve, 50));
      }

      statusElement.className = failed === 0 ? 'alert alert-success' : 'alert alert-warning';
      statusElement.textContent = `Import complete! Imported: ${imported}, Failed: ${failed}`;
      document.getElementById('importBtn').disabled = false;
      document.getElementById('clearBtn').disabled = false;
      log(`\n=== IMPORT COMPLETE ===`);
      log(`Successfully imported: ${imported} records`);
      if (failed > 0) log(`Failed: ${failed} records`, true);
    }

    async function clearAllTransactions() {
      if (!confirm('WARNING: This will delete ALL transactions from Firestore. Are you sure?')) return;
      if (!confirm('FINAL WARNING: This cannot be undone! Continue?')) return;

      statusElement.className = 'alert alert-warning';
      statusElement.textContent = 'Deleting all transactions...';
      document.getElementById('importBtn').disabled = true;
      document.getElementById('clearBtn').disabled = true;
      logElement.innerHTML = '';
      log('Starting deletion of all transactions...');

      try {
        const snapshot = await db.collection('transactions').get();
        const batchSize = 500;
        const totalDocs = snapshot.size;
        let deleted = 0;

        log(`Found ${totalDocs} documents to delete`);

        for (let i = 0; i < snapshot.docs.length; i += batchSize) {
          const batch = db.batch();
          const chunk = snapshot.docs.slice(i, i + batchSize);
          
          chunk.forEach(doc => {
            batch.delete(doc.ref);
          });
          
          await batch.commit();
          deleted += chunk.length;
          log(`Deleted batch: ${deleted}/${totalDocs}`);
          
          const percent = Math.round((deleted / totalDocs) * 100);
          progressBar.style.width = percent + '%';
          progressBar.textContent = percent + '%';
        }

        statusElement.className = 'alert alert-success';
        statusElement.textContent = `Successfully deleted ${deleted} transactions`;
        log(`\n=== DELETION COMPLETE ===`);
        log(`Deleted ${deleted} transactions`);
      } catch (error) {
        statusElement.className = 'alert alert-danger';
        statusElement.textContent = 'Error deleting transactions';
        log(`Error: ${error.message}`, true);
      } finally {
        document.getElementById('importBtn').disabled = false;
        document.getElementById('clearBtn').disabled = false;
      }
    }

    document.getElementById('importBtn').addEventListener('click', importData);
    document.getElementById('clearBtn').addEventListener('click', clearAllTransactions);

    log('Ready. Replace Firebase config with your actual credentials.');
  </script>
